name: DGuard
version: '${project.version}'
main: com.duapar.dguard.DGuard
api-version: '26.1'
author: Duapar
description: Régions protégées façon WorldGuard, créées à partir d'une sélection DWorldEdit (via DAPI).
depend: [DAPI]

permissions:
  dguard.admin:
    description: Autorise la création, la suppression et la configuration des régions DGuard.
    default: op

commands:
  region:
    description: Gère les régions protégées DGuard.
    usage: /region <create|delete|list|info|perm|priority|help> [args]
    aliases: [rg]
